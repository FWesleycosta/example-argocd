#          --title "Promote DEV -> HML" \
#          --auto-complete true
#      env:
#        AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)

- stage: PRD
  displayName: PRD
  dependsOn: PR_HML
  condition: succeeded()
  jobs:
  - deployment: FrontendPrd
    displayName: Build & Deploy PRD
    environment: prd
    pool:
      vmImage: ubuntu-latest
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - checkout: templates
            persistCredentials: true
            path: s          
          - template: templates/terraform-for-front.yaml
            parameters:
              environment: prd
              s3: ${{ parameters.s3 }}
              cloudfront: ${{ parameters.cloudfront }}
              serviceAccount: ${{ variables.PrdServiceAccountTerraform }}
              awsRegion: ${{ variables.PrdAwsRegion }}
              tfstatesBucket: ${{ variables.PrdtfstatesBucket}}
              keyBucketPath: $(Build.Repository.Name)
              dns_name: ${{ parameters.dns_name }}
              access_logging: ${{ variables.PrdAccessloggingworkloads }}

          - template: templates/build-frontend-fibra.yaml
            parameters: 
              viteBaseUrl: ${{ parameters.viteBaseUrlPrd }}
              viteMicrofrontendCessaoCreditoUrl: ${{ parameters.viteMicrofrontendCessaoCreditoUrlPRD }}
              viteHostUrl: ${{ parameters.viteHostUrlPrd }}
              env_vars: ${{ parameters.env_vars }}

          - template: templates/deploy-frontend.yaml
            parameters:
              environment: prd
              cloudfront: ${{ parameters.cloudfront }}
              serviceAccount: ${{ variables.PrdServiceAccount }}
              awsRegion: ${{ variables.PrdAwsRegion }}
              awsAccID: ${{ variables.PrdAwsAccId }}
              cloudfrontDistributionId: $(tfOutputs.CLOUDFRONT_DISTRIBUTION_ID)

- stage: PR_PRD
  displayName: PR HML -> PRD/Main
  dependsOn: PRD
  condition: succeeded()
  jobs:
    - template: templates/utils/create-pullrequest.yaml
      parameters:
        sourceBranch: 'homolog'
        targetBranch: 'main'
