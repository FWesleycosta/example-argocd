
parameters:
  - name: build
    type: object
    default:
      env_vars:
        common: []
        dev: []
        hml: []
        prd: []
  - name: infra
    type: object
    default:
      s3: true
      cloudfront: true
      dns_name: ''
  - name: hotfix
    type: object
    default:
      main_pr_require_manual_approval: false
      main_pr_reviewers: ''
      main_pr_wait_timeout_minutes: 360
  - name: rollbackVersion
    type: string
    default: ''

variables:
  - group: git-credentials

stages:
  - ${{ if ne(parameters.rollbackVersion, '') }}:
      - template: ../stages/rollback-frontend.yaml
        parameters:
          environment: prd
          rollbackVersion: ${{ parameters.rollbackVersion }}
          cloudfront: ${{ parameters.infra.cloudfront }}

  - ${{ else }}:
      - stage: SonarQube
        displayName: SonarQube Scan
        jobs:
          - job: SonarQubeScan
            displayName: 'SonarQube Analysis (frontend)'
            pool:
              vmImage: ubuntu-latest
            steps:
              - checkout: self
                fetchDepth: 0
                displayName: 'Checkout do Código'
              - template: ../sonarqube/qa-sonar-frontend.yaml

      - ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/release/') }}:
          - template: ../stages/deploy-frontend.yaml
            parameters:
              environment: hml
              dependsOn: [SonarQube]
              envVars: ${{ parameters.build.env_vars.hml }}
              commonEnvVars: ${{ parameters.build.env_vars.common }}
              infra: ${{ parameters.infra }}

          - template: ../stages/veracode.yaml
            parameters:
              dependsOn: [SonarQube]

          - template: ../stages/deploy-frontend.yaml
            parameters:
              environment: prd
              dependsOn: [Deploy_hml, Veracode]
              envVars: ${{ parameters.build.env_vars.prd }}
              commonEnvVars: ${{ parameters.build.env_vars.common }}
              infra: ${{ parameters.infra }}

          - stage: PR_Main
            displayName: 'PR release -> main'
            dependsOn: Deploy_prd
            condition: succeeded()
            jobs:
              - template: ../utils/create-pullrequest.yaml
                parameters:
                  sourceBranch: ${{ replace(variables['Build.SourceBranch'], 'refs/heads/', '') }}
                  targetBranch: main

          - stage: BackMerge_Develop
            displayName: 'Back-merge main -> develop'
            dependsOn: PR_Main
            condition: succeeded()
            jobs:
              - template: ../utils/create-pullrequest.yaml
                parameters:
                  sourceBranch: main
                  targetBranch: develop

      - ${{ elseif startsWith(variables['Build.SourceBranch'], 'refs/heads/hotfix/') }}:
          - template: ../hotfix/hotfix-frontend.yaml
            parameters:
              build: ${{ parameters.build }}
              infra: ${{ parameters.infra }}
              hotfix: ${{ parameters.hotfix }}

      - ${{ else }}:
          - template: ../stages/deploy-frontend.yaml
            parameters:
              environment: dev
              dependsOn: [SonarQube]
              condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/develop'), eq(variables['Build.SourceBranch'], 'refs/heads/sandbox')))
              envVars: ${{ parameters.build.env_vars.dev }}
              commonEnvVars: ${{ parameters.build.env_vars.common }}
              infra: ${{ parameters.infra }}
