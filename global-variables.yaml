variables:
  - name: deployment_aspnetcore_environment
    value: development

  - name: serviceAccount
    value: 'AWS-Workloads-Dev'
  - name: clusterName
    value: 'eks-'
  - name: awsRegion
    value: 'us-east-2'
  - name: awsAccID
    value: ''
  - name: albSharedDns
    value: 'internal'
  - name: certificate_arn
    value: 'arn:aws:acm'
  - name: apiGatewayVpcLink
    value: ''
  - name: albSharedListener
    value: 'arn:aws'
  - name: vpc_endpoint_apigw
    value: 'vpce-'
  - name: domain_internal_name
    value: 'dev--int..com.br'
  - name: domain_name_id
    value: ''

  # --- infra adicional do ambiente (Terraform / observabilidade) ---
  # Não consumida hoje pelo deploy.yaml; mantida aqui por ser dado de ambiente.
  - name: serviceAccountTerraform
    value: 'AWS-Workloads-Dev-Terraform'
  - name: tfstatesBucket
    value: 'tfstates-'
  - name: accessLoggingWorkloads
    value: 'access-logging-workloads-dev'
  - name: subnetsPrivate
    value: 'subnet-,subnet-'
  - name: vpcId
    value: 'vpc-'
