parameters:
  - name: dependsOn
    type: object
    default: [Build]
  - name: condition
    type: string
    default: succeeded()

stages:
  - stage: Veracode
    displayName: Veracode SAST
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}
    jobs:
      - job: SecurityScan
        displayName: Veracode SAST
        timeoutInMinutes: 120
        pool:
          vmImage: ubuntu-latest
        steps:
          - template: ../veracode/scanner-veracode.yaml
            parameters:
              appName: $(Build.Repository.Name)
