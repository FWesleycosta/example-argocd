parameters:
  - name: serviceAccount
    type: string
  - name: awsRegion
    type: string
  - name: workingDirectory
    type: string
    default: '$(System.DefaultWorkingDirectory)/terraform'
  - name: lockTimeout
    type: string
    default: '5m'

steps:
  - task: AmazonWebServices.aws-vsts-tools.AWSShellScript.AWSShellScript@1
    displayName: 'TF: init'
    inputs:
      awsCredentials: ${{ parameters.serviceAccount }}
      regionName: ${{ parameters.awsRegion }}
      scriptType: inline
      inlineScript: |
        set -euo pipefail
        cd "${{ parameters.workingDirectory }}"
        terraform init -input=false -reconfigure -lock-timeout="${{ parameters.lockTimeout }}"
