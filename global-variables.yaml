parameters:
  environment: ''
  serviceAccount: ''
  clusterName: ''
  awsRegion: ''
  awsAccID: ''
  albSharedDns: ''
  apiGatewayVpcLink: ''
  albSharedListener: ''
  pod_min_replicas: ''
  pod_max_replicas: ''
  pod_requests_cpu: ''
  pod_requests_memory: ''
  base_path: ''
  deployment_aspnetcore_urls: ''
  deployment_aspnetcore_environment: ''
  ingress_path: ''
  cpu_utilization: ''
  pod_limits_cpu: ''
  pod_limits_memory: ''
  api_visibility: ''
  vpc_endpoint_apigw: ''
  domain_internal_name: ''
  domain_name_id: ''
  domain_name: ''
  env_vars: []
  ssm_parameters: []
  dynamodb_tables: []
  s3_buckets: []
  secrets: []
  dd_lang: ''
  dd_lib_version: 'latest'
  cognito: false
  certificate_arn: ''
  sqs: []

steps:

  - template: steps/image-promote.yaml
    parameters:
      serviceAccount: ${{ parameters.serviceAccount }}
      awsRegion: ${{ parameters.awsRegion }}

  - script: |
      set -euo pipefail

      REPO_DIR="$(Build.SourcesDirectory)/templates"
      TF_TEMPLATES="${REPO_DIR}/manifests/terraform"
      TERRAFORM_BASE="$(Build.SourcesDirectory)/terraform"

      if [ ! -d "$TF_TEMPLATES" ]; then
        echo "##[error]Terraform templates not found: $TF_TEMPLATES"
        exit 1
      fi

      mkdir -p "$TERRAFORM_BASE"
      cp -r "$TF_TEMPLATES"/. "$TERRAFORM_BASE/"

      echo "##[section]Terraform manifests:"
      ls -la "$TERRAFORM_BASE"
    displayName: "Prepare Terraform Manifests"

  - task: TerraformInstaller@1
    displayName: 'Install Terraform'
    continueOnError: true
    inputs:
      terraformVersion: 'latest'

  - task: AmazonWebServices.aws-vsts-tools.AWSShellScript.AWSShellScript@1
    displayName: Create s3 Backend Bucket
    inputs:
      awsCredentials: ${{ parameters.serviceAccount }}
      regionName: ${{ parameters.awsRegion}}
      scriptType: inline
      inlineScript: |
        set -euo pipefail
        
        BUCKET_NAME="tfstate-$(Build.Repository.Name)-${{ parameters.environment }}"
        
        if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
          echo "Bucket '$BUCKET_NAME' already exists, skipping creation."
        else
          echo "Creating bucket '$BUCKET_NAME'..."
          aws s3api create-bucket \
            --bucket "$BUCKET_NAME" \
            --region ${{ parameters.awsRegion }} \
            --create-bucket-configuration LocationConstraint=${{ parameters.awsRegion }}
        
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET_NAME" \
            --versioning-configuration Status=Enabled
        
          echo "Bucket '$BUCKET_NAME' created with versioning and encryption enabled."
        fi

  - bash: |
      set -euo pipefail
      cat > backend.tf <<EOF
      terraform {
        backend "s3" {
          bucket  = "tfstate-$(Build.Repository.Name)-${{ parameters.environment }}"
          key     = "$(Build.Repository.Name)/terraform.tfstate"
          region  = "${{ parameters.awsRegion }}"
          encrypt = true
        }
      }
      EOF
    workingDirectory: $(System.DefaultWorkingDirectory)/terraform
    displayName: "$(Build.Repository.Name)-Configure Remote State (S3)"

  - task: AmazonWebServices.aws-vsts-tools.AWSShellScript.AWSShellScript@1
    displayName: Apply Terraform manifests
    inputs:
      awsCredentials: ${{ parameters.serviceAccount }}
      regionName: ${{ parameters.awsRegion }}
      scriptType: inline
      inlineScript: |
        set -uo pipefail
        
        cd $(System.DefaultWorkingDirectory)/terraform
        
        terraform init -migrate-state
        terraform validate
        
        export TF_VAR_ssm_parameters='${{ convertToJson(parameters.ssm_parameters) }}'
        export TF_VAR_s3_buckets='${{ convertToJson(parameters.s3_buckets) }}'
        export TF_VAR_secrets='${{ convertToJson(parameters.secrets) }}'
        export TF_VAR_queue_name='${{ convertToJson(parameters.sqs) }}'
        
        terraform apply -auto-approve \
          -var="app_name=$(Build.Repository.Name)" \
          -var="environment=${{ parameters.environment }}" \
          -var="namespace=$(Build.Repository.Name)-${{ parameters.environment }}" \
          -var="domain_name=${{ parameters.domain_name }}" \
          -var="cluster_name=${{ parameters.clusterName }}" \
          -var="alb_shared_dns=${{ parameters.albSharedDns }}" \
          -var="api_gateway_vpc_link=${{ parameters.apiGatewayVpcLink }}" \
          -var="alb_shared_listener=${{ parameters.albSharedListener }}" \
          -var="base_path=${{ parameters.base_path }}" \
          -var="api_type=${{ parameters.api_visibility }}" \
          -var="vpc_endpoint_apigw=${{ parameters.vpc_endpoint_apigw }}" \
          -var="domain_internal_name=${{ parameters.domain_internal_name }}" \
          -var="domain_name_id=${{ parameters.domain_name_id }}" \
          -var="cognito=${{ parameters.cognito }}" \
          -var='dynamodb_tables=${{ convertToJson(parameters.dynamodb_tables) }}' \
          -var="certificate_arn=${{ parameters.certificate_arn }}" \
          2>&1 | tee /tmp/tf_output.log
        
        APPLY_EXIT=${PIPESTATUS[0]}
        
        if [ $APPLY_EXIT -eq 0 ]; then
          echo "Terraform apply concluído com sucesso."
          exit 0
        fi
        
        TOTAL_ERRORS=$(grep -c "Error:" /tmp/tf_output.log || true)
        
        BASE_PATH_ERRORS=$(grep -cE "BasePathConflictException|Base path already exists|CreateBasePathMapping" /tmp/tf_output.log || true)
        
        OTHER_ERRORS=$(grep "Error:" /tmp/tf_output.log | grep -vcE "BasePathConflictException|Base path already exists|CreateBasePathMapping" || true)
        
        echo "=========================================="
        echo "Total de linhas com 'Error:':  $TOTAL_ERRORS"
        echo "Erros de Base Path (ok):       $BASE_PATH_ERRORS"
        echo "Outros erros:                  $OTHER_ERRORS"
        echo "=========================================="
        
        
        if [ "$BASE_PATH_ERRORS" -gt 0 ] && [ "$OTHER_ERRORS" -eq 0 ]; then
          echo "##[warning]Apenas erros de Base Path já existente. Ignorando..."
          exit 0
        fi
        
        echo "##[error]Erro inesperado no terraform apply!"
        exit 1

  - template: steps/k8s-render.yaml
    parameters:
      sourceDir: '$(Build.SourcesDirectory)/templates/manifests/k8s'
      outputDir: '$(Build.SourcesDirectory)/k8s'
      namespace: '$(Build.Repository.Name)-${{ parameters.environment }}'
      configMapName: '$(Build.Repository.Name)-app-vars'
      envVars: ${{ parameters.env_vars }}
      substitutions:
        PLACEHOLDER_APP_NAME: '$(Build.Repository.Name)'
        PLACEHOLDER_ECR_IMAGE: '${{ parameters.awsAccID }}.dkr.ecr.${{ parameters.awsRegion }}.amazonaws.com/$(Build.Repository.Name):$(Build.BuildId)'
        PLACEHOLDER_ENVIRONMENT: ${{ parameters.environment }}
        PLACEHOLDER_AWS_REGION: ${{ parameters.awsRegion }}
        PLACEHOLDER_DEPLOYMENT_ASPNETCORE_URLS: '${{ parameters.deployment_aspnetcore_urls }}'
        PLACEHOLDER_DEPLOYMENT_ASPNETCORE_ENVIRONMENT: ${{ parameters.deployment_aspnetcore_environment }}
        PLACEHOLDER_INGRESS_PATH: ${{ parameters.ingress_path }}
        PLACEHOLDER_MIN_REPLICAS: ${{ parameters.pod_min_replicas }}
        PLACEHOLDER_MAX_REPLICAS: ${{ parameters.pod_max_replicas }}
        PLACEHOLDER_REQUESTS_CPU: ${{ parameters.pod_requests_cpu }}
        PLACEHOLDER_REQUESTS_MEMORY: ${{ parameters.pod_requests_memory }}
        PLACEHOLDER_LIMITS_CPU: ${{ parameters.pod_limits_cpu }}
        PLACEHOLDER_LIMITS_MEMORY: ${{ parameters.pod_limits_memory }}
        PLACEHOLDER_CPU_UTILIZATION: ${{ parameters.cpu_utilization }}
        PLACEHOLDER_DD_LANG: ${{ parameters.dd_lang }}
        PLACEHOLDER_DD_LIB_VERSION: ${{ parameters.dd_lib_version }}

  - template: steps/k8s-deploy.yaml
    parameters:
      serviceAccount: ${{ parameters.serviceAccount }}
      awsRegion: ${{ parameters.awsRegion }}
      clusterName: ${{ parameters.clusterName }}
      namespace: '$(Build.Repository.Name)-${{ parameters.environment }}'
      manifestsDir: '$(Build.SourcesDirectory)/k8s'
      workloadName: '$(Build.Repository.Name)'
