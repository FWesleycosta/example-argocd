parameters:
  - name: sourceBranch
    type: string
  - name: targetBranch
    type: string
  - name: bypassPolicy
    type: boolean
    default: true
  - name: requireManualApproval
    type: boolean
    default: false
  - name: reviewers
    type: string
    default: ''
  - name: waitTimeoutMinutes
    type: number
    default: 360

jobs:
  - job: CreateAndCompletePR
    displayName: 'Criar e concluir PR via Azure CLI'
    ${{ if eq(parameters.requireManualApproval, true) }}:
      timeoutInMinutes: ${{ parameters.waitTimeoutMinutes }}
    steps:
      - script: |
          set -euo pipefail

          SOURCE="${{ parameters.sourceBranch }}"
          TARGET="${{ parameters.targetBranch }}"
          # ADO emite booleanos como True/False; lower() em boolean pode falhar — normalizar no bash.
          BYPASS=$(printf '%s' '${{ parameters.bypassPolicy }}' | tr '[:upper:]' '[:lower:]')
          REQUIRE_MANUAL=$(printf '%s' '${{ parameters.requireManualApproval }}' | tr '[:upper:]' '[:lower:]')
          WAIT_MINUTES="${{ parameters.waitTimeoutMinutes }}"

          fail() {
            echo "##[error]=================================================="
            echo "##[error]  FALHA: $1"
            echo "##[error]=================================================="
            echo "##vso[task.logissue type=error]$1"
            exit 1
          }

          echo "##[section]PR de promoção: $SOURCE -> $TARGET  (bypass-policy=$BYPASS, require-manual-approval=$REQUIRE_MANUAL)"

          echo "##[section]Etapa 1/4 — Localizando ou criando o PR"
          PR_ID=$(az repos pr list \
            --source-branch "$SOURCE" \
            --target-branch "$TARGET" \
            --status active \
            --query "[0].pullRequestId" -o tsv)

          if [ -z "$PR_ID" ]; then
            echo "Nenhum PR ativo. Criando novo $SOURCE -> $TARGET..."
            PR_ID=$(az repos pr create \
              --source-branch "$SOURCE" \
              --target-branch "$TARGET" \
              --title "Promote $SOURCE -> $TARGET" \
              --query "pullRequestId" -o tsv)
            echo "PR criado: #$PR_ID"
          else
            echo "PR existente encontrado: #$PR_ID"
          fi

          [ -n "$PR_ID" ] || fail "Nao foi possivel obter ou criar um PR ($SOURCE -> $TARGET)."

          echo "##[section]Etapa 2/4 — Verificando conflitos (mergeStatus) do PR #$PR_ID"
          echo "##[group]Aguardando avaliacao do mergeStatus (clique para expandir)"
          MERGE_STATUS=""
          for i in $(seq 1 12); do
            MERGE_STATUS=$(az repos pr show --id "$PR_ID" --query "mergeStatus" -o tsv)
            echo "tentativa $i: mergeStatus=$MERGE_STATUS"
            case "$MERGE_STATUS" in
              queued|notSet) sleep 5 ;;
              *) break ;;
            esac
          done
          echo "##[endgroup]"

          case "$MERGE_STATUS" in
            succeeded)
              echo "Sem conflitos. PR #$PR_ID apto para merge."
              ;;
            conflicts)
              fail "PR #$PR_ID tem CONFLITOS de merge ($SOURCE -> $TARGET). Merge NAO realizado. Resolva manualmente."
              ;;
            queued|notSet)
              fail "mergeStatus do PR #$PR_ID nao foi avaliado a tempo (status: $MERGE_STATUS)."
              ;;
            *)
              fail "PR #$PR_ID nao esta apto para merge (status: $MERGE_STATUS)."
              ;;
          esac

          if [ "$REQUIRE_MANUAL" = "true" ]; then
            echo "##[section]Etapa 3/4 — Revisores (opcional)"
            if [ -n "${REVIEWERS_RAW:-}" ]; then
              for r in $(echo "$REVIEWERS_RAW" | tr ',' ' '); do
                r=$(echo "$r" | xargs)
                [ -z "$r" ] && continue
                echo "Adicionando revisor: $r"
                az repos pr reviewer add --id "$PR_ID" --reviewers "$r"
              done
            else
              echo "Nenhum revisor extra informado (use politicas de branch no destino para exigir aprovacao)."
            fi

            PR_URL="${SYSTEM_TEAMFOUNDATIONCOLLECTIONURI}${SYSTEM_TEAMPROJECT}/_git/${BUILD_REPOSITORY_NAME}/pullrequest/${PR_ID}"
            echo "##[section]Etapa 4/4 — Aguardando aprovacao e merge manual do PR #$PR_ID"
            echo "Abra o PR no Azure DevOps: $PR_URL"
            echo "##vso[task.logissue type=warning]PR #$PR_ID aguardando merge manual (ate ${WAIT_MINUTES} min)."

            START_TS=$(date +%s)
            END_TS=$((START_TS + WAIT_MINUTES * 60))
            FINAL_STATUS=""
            while [ "$(date +%s)" -lt "$END_TS" ]; do
              FINAL_STATUS=$(az repos pr show --id "$PR_ID" --query "status" -o tsv)
              CUR_MERGE=$(az repos pr show --id "$PR_ID" --query "mergeStatus" -o tsv)
              echo "$(date -Is) status=$FINAL_STATUS mergeStatus=$CUR_MERGE"

              if [ "$FINAL_STATUS" = "completed" ]; then
                echo "##[section]✔ PR #$PR_ID concluido com sucesso ($SOURCE -> $TARGET)"
                exit 0
              fi
              if [ "$FINAL_STATUS" = "abandoned" ] || [ "$CUR_MERGE" = "conflicts" ] || [ "$CUR_MERGE" = "failure" ]; then
                fail "PR #$PR_ID nao pode ser concluido (status=$FINAL_STATUS, mergeStatus=$CUR_MERGE)."
              fi
              sleep 30
            done
            fail "Timeout aguardando merge do PR #$PR_ID apos ${WAIT_MINUTES} min."
          fi

          echo "##[section]Etapa 3/4 — Concluindo o PR #$PR_ID"
          az repos pr update \
            --id "$PR_ID" \
            --status completed \
            --bypass-policy "$BYPASS" \
            --bypass-policy-reason "Promocao automatica via Pipeline" \
            --delete-source-branch false


          echo "##[section]Etapa 4/4 — Confirmando a conclusao do PR #$PR_ID"
          echo "##[group]Aguardando status final (clique para expandir)"
          FINAL_STATUS=""
          for i in $(seq 1 12); do
            FINAL_STATUS=$(az repos pr show --id "$PR_ID" --query "status" -o tsv)
            CUR_MERGE=$(az repos pr show --id "$PR_ID" --query "mergeStatus" -o tsv)
            echo "tentativa $i: status=$FINAL_STATUS mergeStatus=$CUR_MERGE"

            if [ "$FINAL_STATUS" = "completed" ]; then
              break
            fi
            if [ "$FINAL_STATUS" = "abandoned" ] || [ "$CUR_MERGE" = "conflicts" ] || [ "$CUR_MERGE" = "failure" ]; then
              echo "##[endgroup]"
              fail "Conclusao do PR #$PR_ID falhou (status=$FINAL_STATUS, mergeStatus=$CUR_MERGE)."
            fi
            sleep 5
          done
          echo "##[endgroup]"

          [ "$FINAL_STATUS" = "completed" ] || fail "PR #$PR_ID nao atingiu o status 'completed' a tempo (status=$FINAL_STATUS)."

          echo "##[section]✔ PR #$PR_ID concluido com sucesso ($SOURCE -> $TARGET)"
        env:
          AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
          REVIEWERS_RAW: ${{ parameters.reviewers }}
          SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)
          SYSTEM_TEAMPROJECT: $(System.TeamProject)
          BUILD_REPOSITORY_NAME: $(Build.Repository.Name)
        displayName: 'Executar PR via Azure CLI'
